services:
  mysql-e2e:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: haxbrasil_e2e
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent']
      interval: 2s
      timeout: 3s
      retries: 30

  minio-e2e:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'

  minio-bootstrap-e2e:
    image: minio/mc:latest
    depends_on:
      - minio-e2e
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio-e2e:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing local/haxbrasil-e2e
        mc anonymous set download local/haxbrasil-e2e

  redis-e2e:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 3s
      retries: 30
