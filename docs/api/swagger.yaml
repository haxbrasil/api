openapi: 3.0.0
paths:
  /users:
    post:
      description: Creates a user identity using provider and provider user id.
      operationId: UsersController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_already_exists
                  message:
                    type: string
                    example: User already exists
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Create user
      tags: &a1
        - 👤 Users
    get:
      description: Lists users with pagination and optional username filter.
      operationId: UsersController_list
      parameters:
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: pageSize
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
        - name: username
          required: false
          in: query
          schema:
            minLength: 1
            maxLength: 25
            example: Alice
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersPaginatedResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: List users
      tags: *a1
  /users/provider/{provider}/{providerUserId}:
    get:
      description: Fetches a user by provider and provider user id.
      operationId: UsersController_getByIdentity
      parameters:
        - name: provider
          required: true
          in: path
          schema:
            type: string
        - name: providerUserId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_not_found
                  message:
                    type: string
                    example: User not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Get user by identity
      tags: *a1
  /users/{id}:
    put:
      description: Updates mutable fields for a user by id.
      operationId: UsersController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_not_found
                  message:
                    type: string
                    example: User not found
                required:
                  - code
                  - message
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_already_exists
                  message:
                    type: string
                    example: User already exists
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Update user by id
      tags: *a1
  /users/{id}/confirm:
    post:
      description:
        Validates the provided password for a user id and returns whether
        it matches.
      operationId: UsersController_confirm
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmUserDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmUserResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Confirm user credentials
      tags: *a1
  /recs:
    post:
      description: Uploads a HaxBall recording and stores it on file persistence.
      operationId: RecordingsController_create
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - recording
              properties:
                recording:
                  type: string
                  format: binary
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingResponseDto'
        '400':
          description: Invalid recording file
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: recording_invalid
                  message:
                    type: string
                    example: Invalid recording file
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Upload recording
      tags: &a2
        - 📽️ Recordings
    get:
      description: Lists recording codes with pagination for the authenticated tenant.
      operationId: RecordingsController_list
      parameters:
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: pageSize
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingsPaginatedResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: List recording codes
      tags: *a2
  /recs/{code}:
    get:
      description: Finds a recording by code and redirects to the object URL.
      operationId: RecordingsController_redirectByCode
      parameters:
        - name: code
          required: true
          in: path
          schema:
            example: A1B2C3
            type: string
      responses:
        '302':
          description: Redirects to recording object URL.
        '404':
          description: Recording not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: recording_not_found
                  message:
                    type: string
                    example: Recording not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Redirect to recording URL
      tags: *a2
  /rooms:
    post:
      description: Registers a room as active for the authenticated tenant.
      operationId: RoomsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomDto'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Create room
      tags: &a3
        - 🏟️ Rooms
    get:
      description:
        Lists rooms with pagination, optional name filter, and optional
        inclusion of inactive rooms.
      operationId: RoomsController_list
      parameters:
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: page_size
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
        - name: name
          required: false
          in: query
          schema:
            minLength: 1
            maxLength: 150
            example: 'Hax Brasil Room #1'
            type: string
        - name: include_inactive
          required: false
          in: query
          schema:
            default: false
            type: boolean
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomsPaginatedResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: List rooms
      tags: *a3
  /rooms/{uuid}:
    get:
      description: Fetches one room by uuid for the authenticated tenant.
      operationId: RoomsController_getById
      parameters:
        - name: uuid
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponseDto'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: room_not_found
                  message:
                    type: string
                    example: Room not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Get room
      tags: *a3
    put:
      description: Updates room fields. Only active rooms can be edited.
      operationId: RoomsController_update
      parameters:
        - name: uuid
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoomDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponseDto'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: room_not_found
                  message:
                    type: string
                    example: Room not found
                required:
                  - code
                  - message
        '409':
          description: Room is inactive
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: room_inactive
                  message:
                    type: string
                    example: Room is inactive
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Update room
      tags: *a3
    delete:
      description: Marks a room as inactive. Operation is idempotent.
      operationId: RoomsController_deactivate
      parameters:
        - name: uuid
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: Room deactivated.
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: room_not_found
                  message:
                    type: string
                    example: Room not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Deactivate room
      tags: *a3
  /rooms/events:
    post:
      description:
        Stores a room event for an active room or defers it until the room
        appears.
      operationId: RoomEventsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomEventDto'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomEventResponseDto'
        '202':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeferredRoomEventResponseDto'
        '409':
          description: Room is inactive
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: room_inactive
                  message:
                    type: string
                    example: Room is inactive
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Create room event
      tags: &a4
        - 📡 Room Events
  /rooms/{uuid}/events:
    get:
      description: Lists room events for a room uuid with pagination.
      operationId: RoomEventsController_listByRoom
      parameters:
        - name: uuid
          required: true
          in: path
          schema:
            type: string
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: page_size
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomEventsPaginatedResponseDto'
        '404':
          description: Room not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: room_not_found
                  message:
                    type: string
                    example: Room not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: List room events
      tags: *a4
  /room-jobs:
    post:
      description: Enqueues a room opening job and waits up to 15 seconds for completion.
      operationId: RoomJobsController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoomJobDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomJobOpenResponseDto'
        '202':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomJobPendingResponseDto'
        '422':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomJobFailedResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Request room opening
      tags:
        - 🧰 Room Jobs
info:
  title: Hax Brasil API
  description: ''
  version: '1.0'
  contact: {}
tags:
  - name: 👤 Users
    description: Endpoints related to user management and authentication
  - name: 📽️ Recordings
    description: Endpoints related to recording management
  - name: 🏟️ Rooms
    description: Endpoints related to room registration and lifecycle
  - name: 📡 Room Events
    description: Endpoints related to room event ingestion
  - name: 🧰 Room Jobs
    description: Endpoints related to room opening jobs
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CreateUserDto:
      type: object
      properties:
        provider:
          type: string
          example: discord
        providerUserId:
          type: string
          example: '123456789012345678'
        username:
          type: string
          minLength: 1
          maxLength: 25
          example: Alice
        password:
          type: string
          nullable: true
          minLength: 4
          maxLength: 20
        role:
          type: string
          enum: &a5
            - admin
            - mod
            - default
          example: default
      required:
        - provider
        - providerUserId
        - username
    UserResponseDto:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        provider_user_id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: *a5
        created_at:
          type: string
          format: date-time
      required:
        - id
        - provider
        - provider_user_id
        - username
        - role
        - created_at
    PageInfoDto:
      type: object
      properties:
        page:
          type: number
        page_size:
          type: number
        has_next_page:
          type: boolean
      required:
        - page
        - page_size
        - has_next_page
    UsersPaginatedResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponseDto'
        page_info:
          $ref: '#/components/schemas/PageInfoDto'
      required:
        - items
        - page_info
    UpdateUserDto:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 25
          example: Alice
        password:
          type: string
          nullable: true
          minLength: 4
          maxLength: 20
        role:
          type: string
          enum: *a5
          example: mod
    ConfirmUserDto:
      type: object
      properties:
        password:
          type: string
          minLength: 4
          maxLength: 20
          example: secret-password
      required:
        - password
    ConfirmUserResponseDto:
      type: object
      properties:
        is_correct:
          type: boolean
        provider_user_id:
          type: string
          nullable: true
      required:
        - is_correct
        - provider_user_id
    RecordingResponseDto:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        recording_uuid:
          type: string
        url:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - code
        - recording_uuid
        - url
        - created_at
    RecordingCodeResponseDto:
      type: object
      properties:
        code:
          type: string
          example: A1B2C3
      required:
        - code
    RecordingsPaginatedResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecordingCodeResponseDto'
        page_info:
          $ref: '#/components/schemas/PageInfoDto'
      required:
        - items
        - page_info
    RoomGeoDto:
      type: object
      properties:
        code:
          type: string
          example: BR
          minLength: 2
          maxLength: 2
        lat:
          type: number
          example: -23.55
        lon:
          type: number
          example: -46.63
      required:
        - code
        - lat
        - lon
    CreateRoomDto:
      type: object
      properties:
        invite:
          type: string
          minLength: 1
          maxLength: 255
          example: DDWvwykDyiI
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: 'Hax Brasil Room #1'
        player_name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
        password:
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
        public:
          type: boolean
          nullable: true
        max_players:
          type: number
          nullable: true
          minimum: 1
          maximum: 30
        geo:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RoomGeoDto'
        token:
          type: string
          nullable: true
          minLength: 1
          maxLength: 1024
        no_player:
          type: boolean
          nullable: true
      required:
        - invite
        - name
    RoomResponseDto:
      type: object
      properties:
        uuid:
          type: string
        invite:
          type: string
        name:
          type: string
        player_name:
          type: string
          nullable: true
        password:
          type: string
          nullable: true
        public:
          type: boolean
          nullable: true
        max_players:
          type: number
          nullable: true
        geo:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RoomGeoDto'
        token:
          type: string
          nullable: true
        no_player:
          type: boolean
          nullable: true
        active:
          type: boolean
        inactivated_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - uuid
        - invite
        - name
        - active
        - created_at
    RoomListItemResponseDto:
      type: object
      properties:
        uuid:
          type: string
        invite:
          type: string
        name:
          type: string
        player_name:
          type: string
          nullable: true
        public:
          type: boolean
          nullable: true
        max_players:
          type: number
          nullable: true
        geo:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RoomGeoDto'
        no_player:
          type: boolean
          nullable: true
        active:
          type: boolean
        inactivated_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
      required:
        - uuid
        - invite
        - name
        - active
        - created_at
    RoomsPaginatedResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RoomListItemResponseDto'
        page_info:
          $ref: '#/components/schemas/PageInfoDto'
      required:
        - items
        - page_info
    UpdateRoomDto:
      type: object
      properties:
        invite:
          type: string
          minLength: 1
          maxLength: 255
          example: DDWvwykDyiI
        name:
          type: string
          minLength: 1
          maxLength: 150
          example: 'Hax Brasil Room #1'
        player_name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
        password:
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
        public:
          type: boolean
          nullable: true
        max_players:
          type: number
          nullable: true
          minimum: 1
          maximum: 30
        geo:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/RoomGeoDto'
        token:
          type: string
          nullable: true
          minLength: 1
          maxLength: 1024
        no_player:
          type: boolean
          nullable: true
    CreateRoomEventDto:
      type: object
      properties:
        room_uuid:
          type: string
          format: uuid
        event_name:
          type: string
          enum: &a6
            - onPlayerJoin
            - onPlayerLeave
            - onTeamVictory
            - onPlayerChat
            - onPlayerBallKick
            - onTeamGoal
            - onGameStart
            - onGameStop
            - onPlayerAdminChange
            - onPlayerTeamChange
            - onPlayerKicked
            - onGamePause
            - onGameUnpause
            - onPositionsReset
            - onPlayerActivity
            - onStadiumChange
            - onRoomLink
            - onKickRateLimitSet
            - onTeamsLockChange
        timestamp:
          type: string
          format: date-time
          example: 2026-03-04T11:00:00.000Z
        payload:
          type: object
          description: Raw event payload from room process.
      required:
        - room_uuid
        - event_name
        - timestamp
        - payload
    RoomEventResponseDto:
      type: object
      properties:
        uuid:
          type: string
        room_uuid:
          type: string
          format: uuid
        event_name:
          type: string
          enum: *a6
        payload:
          type: object
        timestamp:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
        - uuid
        - room_uuid
        - event_name
        - payload
        - timestamp
        - created_at
    DeferredRoomEventResponseDto:
      type: object
      properties:
        state:
          type: string
          example: deferred
        room_uuid:
          type: string
          format: uuid
        event_name:
          type: string
          enum: *a6
        timestamp:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      required:
        - state
        - room_uuid
        - event_name
        - timestamp
        - expires_at
    RoomEventsPaginatedResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RoomEventResponseDto'
        page_info:
          $ref: '#/components/schemas/PageInfoDto'
      required:
        - items
        - page_info
    CreateRoomJobDto:
      type: object
      properties:
        room_type:
          type: string
          example: futsal-3v3
        room_properties:
          type: object
        token:
          type: string
          nullable: true
          minLength: 1
          maxLength: 1024
      required:
        - room_type
        - room_properties
    RoomJobOpenResponseDto:
      type: object
      properties:
        state:
          type: string
          example: open
        job_id:
          type: string
        room_uuid:
          type: string
          format: uuid
        invite:
          type: string
      required:
        - state
        - job_id
    RoomJobPendingResponseDto:
      type: object
      properties:
        state:
          type: string
          example: pending
        job_id:
          type: string
      required:
        - state
        - job_id
    RoomJobFailedResponseDto:
      type: object
      properties:
        state:
          type: string
          example: failed
        job_id:
          type: string
        code:
          type: string
          example: token_invalid
          description: Failure code from worker completion payload or internal
            compatibility mapping.
        message:
          type: string
      required:
        - state
        - job_id
        - code
security:
  - bearer: []
