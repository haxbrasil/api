openapi: 3.0.0
paths:
  /users:
    post:
      description: Creates a user identity using provider and provider user id.
      operationId: UsersController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserDto'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_already_exists
                  message:
                    type: string
                    example: User already exists
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Create user
      tags: &a1
        - 👤 Users
    get:
      description: Lists users with pagination and optional username filter.
      operationId: UsersController_list
      parameters:
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: pageSize
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
        - name: username
          required: false
          in: query
          schema:
            minLength: 1
            maxLength: 25
            example: Alice
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersPaginatedResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: List users
      tags: *a1
  /users/provider/{provider}/{providerUserId}:
    get:
      description: Fetches a user by provider and provider user id.
      operationId: UsersController_getByIdentity
      parameters:
        - name: provider
          required: true
          in: path
          schema:
            type: string
        - name: providerUserId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_not_found
                  message:
                    type: string
                    example: User not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Get user by identity
      tags: *a1
  /users/{id}:
    put:
      description: Updates mutable fields for a user by id.
      operationId: UsersController_update
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDto'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_not_found
                  message:
                    type: string
                    example: User not found
                required:
                  - code
                  - message
        '409':
          description: User already exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: user_already_exists
                  message:
                    type: string
                    example: User already exists
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Update user by id
      tags: *a1
  /users/{id}/confirm:
    post:
      description:
        Validates the provided password for a user id and returns whether
        it matches.
      operationId: UsersController_confirm
      parameters:
        - name: id
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmUserDto'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmUserResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Confirm user credentials
      tags: *a1
  /recs:
    post:
      description: Uploads a HaxBall recording and stores it on file persistence.
      operationId: RecordingsController_create
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - recording
              properties:
                recording:
                  type: string
                  format: binary
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingResponseDto'
        '400':
          description: Invalid recording file
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: recording_invalid
                  message:
                    type: string
                    example: Invalid recording file
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Upload recording
      tags: &a2
        - 📽️ Recordings
    get:
      description: Lists recording codes with pagination for the authenticated tenant.
      operationId: RecordingsController_list
      parameters:
        - name: page
          required: false
          in: query
          schema:
            minimum: 1
            default: 1
            example: 1
            type: number
        - name: pageSize
          required: false
          in: query
          schema:
            minimum: 1
            maximum: 100
            default: 20
            example: 20
            type: number
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordingsPaginatedResponseDto'
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: List recording codes
      tags: *a2
  /recs/{code}:
    get:
      description: Finds a recording by code and redirects to the object URL.
      operationId: RecordingsController_redirectByCode
      parameters:
        - name: code
          required: true
          in: path
          schema:
            example: A1B2C3
            type: string
      responses:
        '302':
          description: Redirects to recording object URL.
        '404':
          description: Recording not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: recording_not_found
                  message:
                    type: string
                    example: Recording not found
                required:
                  - code
                  - message
        '500':
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: persistence_error
                  message:
                    type: string
                    example: Unexpected error
                required:
                  - code
                  - message
      summary: Redirect to recording URL
      tags: *a2
info:
  title: Hax Brasil API
  description: ''
  version: '1.0'
  contact: {}
tags:
  - name: 👤 Users
    description: Endpoints related to user management and authentication
  - name: 📽️ Recordings
    description: Endpoints related to recording management
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    CreateUserDto:
      type: object
      properties:
        provider:
          type: string
          example: discord
        providerUserId:
          type: string
          example: '123456789012345678'
        username:
          type: string
          minLength: 1
          maxLength: 25
          example: Alice
        password:
          type: string
          nullable: true
          minLength: 4
          maxLength: 20
        role:
          type: string
          enum: &a3
            - admin
            - mod
            - default
          example: default
      required:
        - provider
        - providerUserId
        - username
    UserResponseDto:
      type: object
      properties:
        id:
          type: string
        provider:
          type: string
        provider_user_id:
          type: string
        username:
          type: string
        role:
          type: string
          enum: *a3
        created_at:
          type: string
          format: date-time
      required:
        - id
        - provider
        - provider_user_id
        - username
        - role
        - created_at
    PageInfoDto:
      type: object
      properties:
        page:
          type: number
        page_size:
          type: number
        has_next_page:
          type: boolean
      required:
        - page
        - page_size
        - has_next_page
    UsersPaginatedResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponseDto'
        page_info:
          $ref: '#/components/schemas/PageInfoDto'
      required:
        - items
        - page_info
    UpdateUserDto:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 25
          example: Alice
        password:
          type: string
          nullable: true
          minLength: 4
          maxLength: 20
        role:
          type: string
          enum: *a3
          example: mod
    ConfirmUserDto:
      type: object
      properties:
        password:
          type: string
          minLength: 4
          maxLength: 20
          example: secret-password
      required:
        - password
    ConfirmUserResponseDto:
      type: object
      properties:
        is_correct:
          type: boolean
        provider_user_id:
          type: string
          nullable: true
      required:
        - is_correct
        - provider_user_id
    RecordingResponseDto:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        recording_uuid:
          type: string
        url:
          type: string
        created_at:
          type: string
          format: date-time
      required:
        - id
        - code
        - recording_uuid
        - url
        - created_at
    RecordingCodeResponseDto:
      type: object
      properties:
        code:
          type: string
          example: A1B2C3
      required:
        - code
    RecordingsPaginatedResponseDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecordingCodeResponseDto'
        page_info:
          $ref: '#/components/schemas/PageInfoDto'
      required:
        - items
        - page_info
security:
  - bearer: []
